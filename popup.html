<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard Inserter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-icon">📋</div>
      <div class="header-text">
        <h1>Clipboard Inserter</h1>
        <p class="subtitle">Text hooking for language learning</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-row">
      <div class="control-info">
        <span class="control-label">Monitoring</span>
        <span class="status-dot" id="status-dot"></span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </label>
    </div>

    <div class="control-row">
      <div class="control-info">
        <span class="control-label">Poll interval</span>
      </div>
      <div class="interval-control">
        <input type="number" id="poll-interval" min="100" max="2000" step="50" value="300">
        <span class="interval-unit">ms</span>
      </div>
    </div>

    <div class="divider"></div>

    <button id="open-texthooker" class="btn btn-primary">
      <span class="btn-icon">📖</span>
      Open Texthooker Page
    </button>

    <p class="hint">Works on pages with<br><code>&lt;meta name="clipboard-inserter"&gt;</code></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
