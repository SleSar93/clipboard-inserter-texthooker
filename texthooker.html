<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="clipboard-inserter" content="true">
  <title>Texthooker</title>
  <link rel="stylesheet" href="texthooker.css">
</head>
<body>
  <!-- ── Header Bar ── -->
  <header id="header">
    <div class="header-left">
      <h1>
        <span class="header-icon">文</span>
        Texthooker
      </h1>
      <span class="line-counter" id="line-counter">0 lines</span>
      <span class="char-counter" id="char-counter">0 chars</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="btn-settings" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="header-btn" id="btn-export" title="Export text">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="header-btn danger" id="btn-clear" title="Clear all text">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Settings Panel ── -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-grid">
      <div class="setting-group">
        <label>Font Size</label>
        <div class="setting-control">
          <input type="range" id="font-size" min="14" max="48" value="24">
          <span class="setting-value" id="font-size-value">24px</span>
        </div>
      </div>
      <div class="setting-group">
        <label>Line Height</label>
        <div class="setting-control">
          <input type="range" id="line-height" min="1.2" max="3" step="0.1" value="1.8">
          <span class="setting-value" id="line-height-value">1.8</span>
        </div>
      </div>
      <div class="setting-group">
        <label>Font Family</label>
        <select id="font-family">
          <option value="'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif">Noto Sans JP</option>
          <option value="'Noto Serif JP', 'Yu Mincho', serif">Noto Serif JP</option>
          <option value="'Yu Gothic', 'Meiryo', sans-serif">Yu Gothic</option>
          <option value="'Yu Mincho', serif">Yu Mincho</option>
          <option value="'MS Gothic', monospace">MS Gothic</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Auto-scroll</label>
        <label class="toggle-mini">
          <input type="checkbox" id="auto-scroll" checked>
          <span class="toggle-mini-track"><span class="toggle-mini-thumb"></span></span>
        </label>
      </div>
    </div>
  </div>

  <!-- ── Text Container ── -->
  <main id="clipboard-inserter-container" class="text-container"></main>

  <script src="texthooker.js"></script>
</body>
</html>
